services:
  - type: web
    name: dental-root-analysis-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./dental_root_analysis.db
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.10.12
